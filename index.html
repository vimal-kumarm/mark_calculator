<!DOCTYPE html>
<html>
<head>
    <title>Marks Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="calculator.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center " style="min-height: 100vh;">
    <div class="container py-5 d-flex justify-content-center">
        <div class="card shadow-sm mx-auto" style="max-width: 500px;">
            <div class="card-body calculator">
                <h2 class="card-title text-center mb-4">Student Marks Calculator</h2>
                <div class="mb-3">
                    <label for="studentName" class="form-label">Student Name</label>
                    <input id="studentName" type="text" class="form-control" placeholder="Enter student name">
                </div>
                <div class="mb-3">
                    <label for="mark1" class="form-label">Subject 1 marks</label>
                    <input id="mark1" type="number" class="form-control" placeholder="0 - 100">
                </div>
                <div class="mb-3">
                    <label for="mark2" class="form-label">Subject 2 marks</label>
                    <input id="mark2" type="number" class="form-control" placeholder="0 - 100">
                </div>
                <div class="mb-3">
                    <label for="mark3" class="form-label">Subject 3 marks</label>
                    <input id="mark3" type="number" class="form-control" placeholder="0 - 100">
                </div>
                <div class="d-grid">
                    <div class="mb-3">
                    <label for="mark3" class="form-label">Subject 3 marks</label>
                    <input id="mark3" type="number" class="form-control" placeholder="0 - 100">
                </div>
                 <div class="d-grid">
                    <div class="mb-3">
                    <label for="mark4" class="form-label">Subject 4 marks</label>
                    <input id="mark4" type="number" class="form-control" placeholder="0 - 100">
                </div>
                
                    <button onclick="calculate()" class="btn btn-success">Calculate Grade</button>
                </div>
                <div id="result" class="mt-4 fs-5 fw-semibold"></div>
            </div>
        </div>
    </div>

    <script>
        function calculate() {
            let name = document.getElementById("studentName").value;
            let m1 = Number(document.getElementById("mark1").value);
            let m2 = Number(document.getElementById("mark2").value);
            let m3 = Number(document.getElementById("mark3").value);
            let m4 = Number(document.getElementById("mark4").value);

            let avg = (m1 + m2 + m3 + m4) / 4;
            let grade;

            if (avg >= 90) grade = "A+";
            else if (avg >= 75) grade = "A";
            else if (avg >= 60) grade = "B";
            else if (avg >= 50) grade = "C";
            else grade = "Fail";

            let result = document.getElementById("result");
            result.innerHTML = name + " — Average: " + avg.toFixed(1) + " | Grade: " + grade;
            result.style.color = grade === "Fail" ? "red" : "green";
        }
    </script>
</body>
</html>
